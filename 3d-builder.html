<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Hand Architect Pro - Left Hand Build</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; background-color: #020617; color: white; font-family: sans-serif; }
        canvas { display: block; }
        .nav-glass {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        #video-container {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 260px;
            height: 195px;
            border-radius: 16px;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.2);
            transform: scaleX(-1);
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            background: #000;
        }
        #input-video { width: 100%; height: 100%; object-fit: cover; }
        #output-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .btn-tool {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s;
            font-weight: 600;
        }
        .active-tool {
            border: 2px solid #3b82f6;
            background: rgba(59, 130, 246, 0.25);
            color: #60a5fa;
        }
    </style>
</head>
<body>

    <nav class="nav-glass fixed top-0 left-0 w-full z-20 px-6 py-3 flex items-center justify-between">
        <div class="flex items-center gap-6">
            <div>
                <h1 class="text-lg font-black bg-gradient-to-r from-blue-400 to-cyan-400 bg-clip-text text-transparent italic leading-tight uppercase tracking-tighter">Hand Architect v3.1</h1>
                <div id="status-card" class="flex items-center gap-2 mt-0.5">
                    <div id="status-dot" class="w-2 h-2 rounded-full bg-yellow-500 animate-pulse"></div>
                    <span id="status-text" class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Inisialisasi...</span>
                </div>
            </div>
            
            <div class="flex gap-2 ml-4">
                <button onclick="setShape('box')" id="btn-box" class="btn-tool px-3 py-2 rounded-xl active-tool text-[10px]">📦 BOX (1)</button>
                <button onclick="setShape('sphere')" id="btn-sphere" class="btn-tool px-3 py-2 rounded-xl text-[10px]">🔮 BOLA (2)</button>
                <button onclick="setShape('cone')" id="btn-cone" class="btn-tool px-3 py-2 rounded-xl text-[10px]">🍦 CONE (3)</button>
                <button onclick="setShape('heart')" id="btn-heart" class="btn-tool px-3 py-2 rounded-xl text-[10px]">❤️ HEART (4)</button>
                <button onclick="setShape('cylinder')" id="btn-cylinder" class="btn-tool px-3 py-2 rounded-xl text-[10px]">🧪 CYL (5)</button>
            </div>
        </div>

        <div class="hidden xl:flex flex-col items-center">
            <div class="flex gap-6 text-[10px] font-bold uppercase tracking-wider text-slate-400">
                <span class="flex items-center gap-2"><b class="text-blue-400">R</b> MEKAR: PUTAR & PILIH SHAPE</span>
                <span class="text-slate-700">|</span>
                <span class="flex items-center gap-2"><b class="text-purple-400">L</b> CUBIT: TARUH OBJEK</span>
                <span class="text-slate-700">|</span>
                <span class="flex items-center gap-2"><b class="text-purple-400">L</b> GENGGAM: ZOOM IN</span>
            </div>
        </div>

        <div class="flex items-center gap-6">
            <input type="color" id="color-picker" value="#3b82f6" class="w-9 h-9 rounded-lg cursor-pointer bg-transparent border-none">
            <button onclick="clearScene()" class="bg-red-500/10 hover:bg-red-500/20 border border-red-500/30 px-5 py-2.5 rounded-xl transition text-red-400 text-[10px] font-black uppercase tracking-widest">Hapus</button>
        </div>
    </nav>

    <div id="video-container">
        <video id="input-video" playsinline></video>
        <canvas id="output-canvas"></canvas>
    </div>

    <script>
        let scene, camera, renderer, ghostObject;
        let shapes = [];
        let currentShapeType = 'box';
        let isBuilding = false;
        let lastBuildTime = 0;
        
        // --- Smart States ---
        let targetAngle = 0;
        let currentAngle = 0;
        let lastRightHandX = null;
        
        let targetRadius = 8.5;
        let currentRadius = 8.5;
        const RAD_MIN = 3.5;
        const RAD_MAX = 14.0;
        const RAD_DEFAULT = 8.5;

        // Config
        const FIST_THRESHOLD = 0.12;
        const PINCH_THRESHOLD = 0.045;
        const ROTATE_SENS = 6.0;

        function initThree() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020617);
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
            updateCameraPos();

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.4));
            const p1 = new THREE.PointLight(0x3b82f6, 1.8); p1.position.set(10, 15, 10); scene.add(p1);
            const p2 = new THREE.PointLight(0xa855f7, 1.2); p2.position.set(-10, 10, -5); scene.add(p2);
            scene.add(new THREE.GridHelper(40, 40, 0x1e293b, 0x0f172a));

            createGhost();
            window.addEventListener('resize', onResize);
        }

        function updateCameraPos() {
            camera.position.x = currentRadius * Math.sin(currentAngle);
            camera.position.z = currentRadius * Math.cos(currentAngle);
            camera.position.y = 4.5;
            camera.lookAt(0, 0, 0);
        }

        function getHeartGeometry() {
            const shape = new THREE.Shape();
            shape.moveTo(2.5, 2.5);
            shape.bezierCurveTo(2.5, 2.5, 2, 0, 0, 0);
            shape.bezierCurveTo(-3, 0, -3, 3.5, -3, 3.5);
            shape.bezierCurveTo(-3, 5.5, -1.5, 7.7, 2.5, 9.5);
            shape.bezierCurveTo(6, 7.7, 8, 5.5, 8, 3.5);
            shape.bezierCurveTo(8, 3.5, 8, 0, 5, 0);
            shape.bezierCurveTo(3.5, 0, 2.5, 2.5, 2.5, 2.5);
            const geo = new THREE.ExtrudeGeometry(shape, { depth: 2, bevelEnabled: true, bevelSize: 1, bevelThickness: 1 });
            geo.center(); geo.scale(0.08, 0.08, 0.08); geo.rotateX(Math.PI);
            return geo;
        }

        function createGhost() {
            if (ghostObject) scene.remove(ghostObject);
            const s = 0.7;
            let geo;
            switch(currentShapeType) {
                case 'box': geo = new THREE.BoxGeometry(s, s, s); break;
                case 'sphere': geo = new THREE.SphereGeometry(s/1.4, 32, 32); break;
                case 'cone': geo = new THREE.ConeGeometry(s/1.4, s, 32); break;
                case 'heart': geo = getHeartGeometry(); break;
                case 'cylinder': geo = new THREE.CylinderGeometry(s/1.6, s/1.6, s, 32); break;
            }
            ghostObject = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ 
                color: document.getElementById('color-picker').value,
                transparent: true, opacity: 0.5, wireframe: true
            }));
            scene.add(ghostObject);
        }

        function setShape(type) {
            if (currentShapeType === type) return;
            currentShapeType = type;
            document.querySelectorAll('.btn-tool').forEach(b => b.classList.remove('active-tool'));
            document.getElementById(`btn-${type}`).classList.add('active-tool');
            createGhost();
        }

        function placeObject() {
            const now = Date.now();
            if (now - lastBuildTime < 800) return;
            lastBuildTime = now;
            const mat = new THREE.MeshStandardMaterial({ color: document.getElementById('color-picker').value, metalness: 0.6, roughness: 0.1 });
            const mesh = new THREE.Mesh(ghostObject.geometry.clone(), mat);
            mesh.position.copy(ghostObject.position);
            mesh.rotation.copy(ghostObject.rotation);
            scene.add(mesh);
            shapes.push(mesh);
            mesh.scale.set(0,0,0);
            let sc = 0;
            const inv = setInterval(() => { sc += 0.15; if(sc >= 1) { mesh.scale.set(1,1,1); clearInterval(inv); } else mesh.scale.set(sc,sc,sc); }, 16);
        }

        function clearScene() { shapes.forEach(s => scene.remove(s)); shapes = []; }
        function onResize() { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); }

        // --- Hand Tracking ---
        const video = document.getElementById('input-video');
        const canvas = document.getElementById('output-canvas');
        const ctx = canvas.getContext('2d');
        const hands = new Hands({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });

        hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.8, minTrackingConfidence: 0.8 });
        hands.onResults(onResults);

        function countFingers(l) {
            let count = 0;
            if (l[8].y < l[6].y) count++;
            if (l[12].y < l[10].y) count++;
            if (l[16].y < l[14].y) count++;
            if (l[20].y < l[18].y) count++;
            const thumbDist = Math.abs(l[4].x - l[17].x);
            if (thumbDist > 0.15) count++;
            return count;
        }

        function getOpenness(l) {
            let d = 0;
            [8, 12, 16, 20].forEach(i => d += Math.sqrt(Math.pow(l[i].x-l[0].x,2)+Math.pow(l[i].y-l[0].y,2)));
            return d / 4;
        }

        function onResults(res) {
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            ctx.save(); ctx.clearRect(0, 0, canvas.width, canvas.height);
            let rIn = false, lIn = false;

            if (res.multiHandLandmarks) {
                document.getElementById('status-dot').className = "w-2 h-2 rounded-full bg-green-500";
                document.getElementById('status-text').innerText = `${res.multiHandLandmarks.length} TANGAN AKTIF`;

                res.multiHandLandmarks.forEach((l, i) => {
                    const side = res.multiHandedness[i].label;
                    drawConnectors(ctx, l, HAND_CONNECTIONS, {color: side==='Right'?'#3b82f6':'#a855f7', lineWidth: 3});
                    drawLandmarks(ctx, l, {color: '#ffffff', lineWidth: 1, radius: 2});

                    const open = getOpenness(l);

                    if (side === 'Right') {
                        rIn = true;
                        // Tangan Kanan: Navigator & Selector
                        if (open >= FIST_THRESHOLD) {
                            const num = countFingers(l);
                            if (num === 1) setShape('box');
                            else if (num === 2) setShape('sphere');
                            else if (num === 3) setShape('cone');
                            else if (num === 4) setShape('heart');
                            else if (num === 5) setShape('cylinder');

                            if (lastRightHandX === null) lastRightHandX = l[0].x;
                            else {
                                const dx = l[0].x - lastRightHandX;
                                targetAngle += dx * ROTATE_SENS;
                                lastRightHandX = l[0].x;
                            }
                        } else {
                            lastRightHandX = null;
                        }
                    } 
                    else {
                        lIn = true;
                        // Tangan Kiri: Arsitek (Membangun & Zoom)
                        
                        // 1. POSITIONING PREVIEW (Mengikuti Tangan Kiri)
                        const p = l[0];
                        const rx = (p.x-0.5)*-18, ry = (p.y-0.5)*-12, rz = p.z*12;
                        ghostObject.position.x = rx * Math.cos(currentAngle) + rz * Math.sin(currentAngle);
                        ghostObject.position.z = -rx * Math.sin(currentAngle) + rz * Math.cos(currentAngle);
                        ghostObject.position.y = ry;
                        ghostObject.visible = true;

                        // 2. DETEKSI CUBIT (PINCH) UNTUK MEMBANGUN
                        const tip = l[8], thumb = l[4];
                        const distPinch = Math.sqrt(Math.pow(tip.x-thumb.x,2)+Math.pow(tip.y-thumb.y,2));
                        
                        if (distPinch < PINCH_THRESHOLD) {
                            ctx.fillStyle = "white";
                            ctx.beginPath(); ctx.arc(tip.x*canvas.width, tip.y*canvas.height, 12, 0, 2*Math.PI); ctx.fill();
                            if(!isBuilding) {
                                isBuilding = true;
                                placeObject();
                            }
                        } else {
                            isBuilding = false;
                        }

                        // 3. DETEKSI GENGGAM (FIST) UNTUK ZOOM
                        if (open < FIST_THRESHOLD) {
                            targetRadius = RAD_MIN;
                            ctx.fillStyle = "rgba(168, 85, 247, 0.4)";
                            ctx.beginPath(); ctx.arc(l[0].x*canvas.width, l[0].y*canvas.height, 35, 0, 2*Math.PI); ctx.fill();
                        } else {
                            targetRadius = RAD_MAX;
                        }
                    }
                });
            } else {
                document.getElementById('status-dot').className = "w-2 h-2 rounded-full bg-yellow-500 animate-pulse";
                document.getElementById('status-text').innerText = "Mencari Tangan...";
            }

            if(!lIn) { ghostObject.visible = false; targetRadius = RAD_DEFAULT; }
            if(!rIn) { lastRightHandX = null; }
            ctx.restore();
        }

        const cam = new Camera(video, { onFrame: async () => await hands.send({image: video}), width: 640, height: 480 });

        function animate() {
            requestAnimationFrame(animate);
            currentAngle += (targetAngle - currentAngle) * 0.12;
            currentRadius += (targetRadius - currentRadius) * 0.08;
            updateCameraPos();
            if (ghostObject.visible) {
                ghostObject.rotation.y += 0.02;
                ghostObject.material.color.set(document.getElementById('color-picker').value);
            }
            const t = Date.now() * 0.001;
            shapes.forEach((s, i) => { s.position.y += Math.sin(t + i) * 0.001; s.rotation.y += 0.005; });
            renderer.render(scene, camera);
        }

        window.onload = () => { initThree(); animate(); cam.start(); };
    </script>
</body>
</html>
