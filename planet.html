<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Planet Partikel Interaktif</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #canvas-container { position: absolute; width: 100%; height: 100%; }
        #ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            z-index: 10;
            pointer-events: none;
            background: rgba(0,0,0,0.5);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        #video-container {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 200px;
            height: 150px;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #444;
            transform: scaleX(-1);
            z-index: 5;
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        .status-text { font-size: 1.2rem; font-weight: bold; color: #00d2ff; }
        .hint { font-size: 0.8rem; color: #ccc; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="ui-overlay">
        <div class="status-text" id="planet-name">Memuat Kamera...</div>
        <div id="gesture-count">Tunjukkan tangan Anda</div>
        <div class="hint">1-5: Matahari-Mars | 6-9: Jup-Pluto | 10: Ledakan | Kepal: Reset</div>
    </div>

    <div id="video-container">
        <video id="input-video"></video>
    </div>

    <div id="canvas-container"></div>

    <script>
        // --- KONFIGURASI PLANET ---
        const PLANET_DATA = [
            { name: "Matahari", color: [1.0, 0.4, 0.0], size: 2.5, particles: 2000 },
            { name: "Merkurius", color: [0.7, 0.7, 0.7], size: 0.6, particles: 800 },
            { name: "Venus", color: [0.9, 0.7, 0.4], size: 0.9, particles: 1000 },
            { name: "Bumi", color: [0.2, 0.5, 1.0], size: 1.0, particles: 1200 },
            { name: "Mars", color: [0.9, 0.2, 0.1], size: 0.7, particles: 900 },
            { name: "Jupiter", color: [0.8, 0.6, 0.4], size: 2.0, particles: 1800 },
            { name: "Saturnus", color: [0.9, 0.8, 0.5], size: 1.7, particles: 1600 },
            { name: "Uranus", color: [0.5, 0.9, 0.9], size: 1.2, particles: 1100 },
            { name: "Neptunus", color: [0.2, 0.3, 0.9], size: 1.1, particles: 1100 },
            { name: "Pluto", color: [0.6, 0.6, 0.7], size: 0.4, particles: 600 }
        ];

        let scene, camera, renderer, particleSystem;
        const totalParticles = 12000;
        let positions = new Float32Array(totalParticles * 3);
        let targetPositions = new Float32Array(totalParticles * 3);
        let colors = new Float32Array(totalParticles * 3);
        let targetColors = new Float32Array(totalParticles * 3);
        let sizes = new Float32Array(totalParticles);
        
        let currentMode = "LINED_UP"; // LINED_UP, SINGLE, EXPLODE
        let activePlanetIndex = -1;

        // --- INISIALISASI THREE.JS ---
        function initThree() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 15;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            const geometry = new THREE.BufferGeometry();
            
            // Initial positions (random scattered)
            for (let i = 0; i < totalParticles; i++) {
                positions[i * 3] = (Math.random() - 0.5) * 40;
                positions[i * 3 + 1] = (Math.random() - 0.5) * 40;
                positions[i * 3 + 2] = (Math.random() - 0.5) * 40;
                
                colors[i * 3] = 1;
                colors[i * 3 + 1] = 1;
                colors[i * 3 + 2] = 1;
                
                sizes[i] = Math.random() * 0.05 + 0.02;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 0.08,
                vertexColors: true,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending
            });

            particleSystem = new THREE.Points(geometry, material);
            scene.add(particleSystem);

            window.addEventListener('resize', onWindowResize);
            createLinedUpFormation();
            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- FORMATIONS ---
        
        function createLinedUpFormation() {
            currentMode = "LINED_UP";
            document.getElementById('planet-name').innerText = "Tata Surya Berjejer";
            
            let pIdx = 0;
            const spacing = 2.5;
            const startX = -(PLANET_DATA.length * spacing) / 2;

            PLANET_DATA.forEach((planet, planetIdx) => {
                const center = new THREE.Vector3(startX + planetIdx * spacing * 1.2, 0, 0);
                for (let i = 0; i < planet.particles; i++) {
                    if (pIdx >= totalParticles) break;
                    
                    // Create sphere for each planet
                    const phi = Math.acos(-1 + (2 * i) / planet.particles);
                    const theta = Math.sqrt(planet.particles * Math.PI) * phi;
                    
                    const r = planet.size * 0.4;
                    targetPositions[pIdx * 3] = center.x + r * Math.cos(theta) * Math.sin(phi);
                    targetPositions[pIdx * 3 + 1] = center.y + r * Math.sin(theta) * Math.sin(phi);
                    targetPositions[pIdx * 3 + 2] = center.z + r * Math.cos(phi);
                    
                    targetColors[pIdx * 3] = planet.color[0];
                    targetColors[pIdx * 3 + 1] = planet.color[1];
                    targetColors[pIdx * 3 + 2] = planet.color[2];
                    
                    pIdx++;
                }
            });

            // Rest of particles hide
            for (let i = pIdx; i < totalParticles; i++) {
                targetPositions[i * 3] = 0;
                targetPositions[i * 3 + 1] = -100; // Move far away
                targetPositions[i * 3 + 2] = 0;
            }
        }

        function createSinglePlanetFormation(index) {
            currentMode = "SINGLE";
            const planet = PLANET_DATA[index];
            document.getElementById('planet-name').innerText = planet.name;
            document.getElementById('planet-name').style.color = `rgb(${planet.color[0]*255},${planet.color[1]*255},${planet.color[2]*255})`;

            let pIdx = 0;
            // Use all particles for one big planet
            for (let i = 0; i < totalParticles; i++) {
                const phi = Math.acos(-1 + (2 * i) / totalParticles);
                const theta = Math.sqrt(totalParticles * Math.PI) * phi;
                
                const r = planet.size * 2.5;
                targetPositions[i * 3] = r * Math.cos(theta) * Math.sin(phi);
                targetPositions[i * 3 + 1] = r * Math.sin(theta) * Math.sin(phi);
                targetPositions[i * 3 + 2] = r * Math.cos(phi);
                
                // Variasi warna sedikit agar lebih natural
                const noise = (Math.random() - 0.5) * 0.1;
                targetColors[i * 3] = Math.max(0, Math.min(1, planet.color[0] + noise));
                targetColors[i * 3 + 1] = Math.max(0, Math.min(1, planet.color[1] + noise));
                targetColors[i * 3 + 2] = Math.max(0, Math.min(1, planet.color[2] + noise));
            }
        }

        function createExplosion() {
            currentMode = "EXPLODE";
            document.getElementById('planet-name').innerText = "Supernova!";
            document.getElementById('planet-name').style.color = "#ffffff";

            for (let i = 0; i < totalParticles; i++) {
                const r = 15 + Math.random() * 20;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.random() * Math.PI;

                targetPositions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
                targetPositions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
                targetPositions[i * 3 + 2] = r * Math.cos(phi);
                
                targetColors[i * 3] = Math.random();
                targetColors[i * 3 + 1] = Math.random();
                targetColors[i * 3 + 2] = Math.random();
            }
        }

        // --- ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            const posAttr = particleSystem.geometry.attributes.position;
            const colAttr = particleSystem.geometry.attributes.color;

            for (let i = 0; i < totalParticles * 3; i++) {
                // Smooth interpolation (lerp)
                posAttr.array[i] += (targetPositions[i] - posAttr.array[i]) * 0.08;
                colAttr.array[i] += (targetColors[i] - colAttr.array[i]) * 0.1;
            }

            posAttr.needsUpdate = true;
            colAttr.needsUpdate = true;
            
            // Subtle rotation
            particleSystem.rotation.y += 0.002;
            if (currentMode === "EXPLODE") {
                 particleSystem.rotation.x += 0.005;
            }

            renderer.render(scene, camera);
        }

        // --- GESTURE RECOGNITION (MediaPipe) ---
        const videoElement = document.getElementById('input-video');
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });

        hands.onResults(onResults);

        function onResults(results) {
            let totalFingers = 0;
            let leftHandFingers = 0;
            let rightHandFingers = 0;

            if (results.multiHandLandmarks && results.multiHandedness) {
                for (let i = 0; i < results.multiHandLandmarks.length; i++) {
                    const landmarks = results.multiHandLandmarks[i];
                    const label = results.multiHandedness[i].label; // Left or Right
                    
                    const count = countFingers(landmarks);
                    if (label === "Left") leftHandFingers = count;
                    else rightHandFingers = count;
                    
                    totalFingers += count;
                }
            }

            updateState(rightHandFingers, leftHandFingers, totalFingers);
        }

        function countFingers(landmarks) {
            let count = 0;
            // Tips of fingers: Index(8), Middle(12), Ring(16), Pinky(20)
            const fingerTips = [8, 12, 16, 20];
            fingerTips.forEach(tip => {
                if (landmarks[tip].y < landmarks[tip - 2].y) count++;
            });
            // Thumb(4) - simple check relative to cmc
            if (Math.abs(landmarks[4].x - landmarks[2].x) > 0.05) count++;
            return count;
        }

        let lastFingerCount = -1;
        function updateState(right, left, total) {
            const statusDiv = document.getElementById('gesture-count');
            
            // Logic mapping based on user request:
            // Right Hand: 1 (Sun), 2 (Merc), 3 (Ven), 4 (Earth), 5 (Mars)
            // Left Hand: 6 (Sat), 7 (Ura), 8 (Nep), 9 (Plu) - note: Jupiter missed in text? 
            // Let's map sequentially for clarity:
            
            let targetIdx = -1;
            
            if (total === 10) {
                if (lastFingerCount !== 10) createExplosion();
                statusDiv.innerText = "10 Jari: SUPERNOVA!";
                lastFingerCount = 10;
                return;
            }

            if (total === 0) {
                if (lastFingerCount !== 0) createLinedUpFormation();
                statusDiv.innerText = "Kepal: Reset Tata Surya";
                lastFingerCount = 0;
                return;
            }

            // Mapping 1-9
            if (right > 0 && left === 0) {
                targetIdx = right - 1; // 1-5 -> 0-4 (Sun to Mars)
            } else if (left > 0) {
                // If left hand is used, we add 5 to the base (6-10)
                targetIdx = 4 + left; // 1 (6th) to 4 (9th) -> 5-8 (Jupiter to Pluto)
            }

            if (targetIdx !== -1 && targetIdx < PLANET_DATA.length) {
                if (lastFingerCount !== (targetIdx + 1)) {
                    createSinglePlanetFormation(targetIdx);
                }
                statusDiv.innerText = `Gestur: ${targetIdx + 1} Jari`;
                lastFingerCount = targetIdx + 1;
            }
        }

        const cameraUtils = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({ image: videoElement });
            },
            width: 640,
            height: 480
        });
        cameraUtils.start();

        // Start
        window.onload = initThree;

    </script>
</body>
</html>
